services:
  nginx:
    container_name: bitrix_nginx
    volumes:
      - ./docker/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - bx_local_net

  php:
    build:
      args:
        INSTALL_XDEBUG: "1"
    container_name: bitrix_php
    environment:
      PHP_IDE_CONFIG: "serverName=docker"
      MODE: "DEVELOPMENT"
      XDEBUG_SESSION: "1"
      BITRIX_MAIL_EMAIL_FROM: "no-reply@mailpit.local"
      BITRIX_MAIL_EMAIL_TO: 'to@mailpit.local'
      BITRIX_MAIL_EMAIL_COPY: 'copy@mailpit.local'
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      SMTP_EMAIL: "no-reply@mailpit.local"
      SMTP_AUTH: "off"
      SMTP_TLS: "off"
      SMTP_TLS_STARTTLS: "off"
      SMTP_TLS_CERTCHECK: "off"
    volumes:
      - ./docker/php/php.dev.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    networks:
      - bx_local_net

  database:
    container_name: bitrix_database
    ports:
      - "3307:3306"
    environment:
      MARIADB_INITDB_SKIP_TZINFO: "1"
    command:
      - "--innodb-flush-log-at-trx-commit=2"
      - "--innodb-doublewrite=0"
      - "--sync-binlog=0"
    networks:
      - bx_local_net

  mailpit:
    image: axllent/mailpit:latest
    container_name: bitrix_mailpit
    restart: unless-stopped
    ports:
      - "8085:8025"
    expose:
      - "1025"
    environment:
      MP_MAX_MESSAGES: "5000"
      MP_DATABASE: "/data/mailpit.db"
    volumes:
      - mailpit_data:/data
    networks:
      - bx_local_net
  
  ofelia:
    image: alpine:latest
    container_name: bitrix_ofelia
    command: ["sh", "-c", "echo 'Ofelia disabled in dev environment' && trap exit TERM; while true; do sleep 3600; done"]
    volumes: []
    networks: []

volumes:
  mailpit_data:
    driver: local
