[www]

pm = dynamic
pm.max_children = 25
pm.start_servers = 5
pm.min_spare_servers = 2
pm.max_spare_servers = 10
pm.max_requests = 500

user = www-data
group = www-data
listen = 9000

request_terminate_timeout = 60
request_slowlog_timeout = 10
slowlog = /var/www/html/local/logs/slow.log

clear_env = no
catch_workers_output = yes

php_value[error_log] = /var/www/html/local/logs/php_errors.log
php_value[log_errors] = on
php_value[display_errors] = off
php_value[memory_limit] = 512M
